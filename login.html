    #loader-wrapper {
      position: fixed;

    #loader {
      display: block;
      position: relative;
      left: 50%;
      top: 50%;
      width: 150px;
      height: 150px;
      margin: -75px 0 0 -75px;
      border-radius: 50%;
      border: 3px solid transparent;
      border-top-color: #FFF;
      -webkit-animation: spin 2s linear infinite;
      -ms-animation: spin 2s linear infinite;
      -moz-animation: spin 2s linear infinite;
      -o-animation: spin 2s linear infinite;
      animation: spin 2s linear infinite;
      z-index: 1001;
    }

    #loader:before {
      content: "";
      position: absolute;
      top: 5px;
      left: 5px;
      right: 5px;
      bottom: 5px;
      border-radius: 50%;
      border: 3px solid transparent;
      border-top-color: #FFF;
      -webkit-animation: spin 3s linear infinite;
      -moz-animation: spin 3s linear infinite;
      -o-animation: spin 3s linear infinite;
      -ms-animation: spin 3s linear infinite;
      animation: spin 3s linear infinite;
    }

    #loader:after {
      content: "";
      position: absolute;
      top: 15px;
      left: 15px;
      right: 15px;
      bottom: 15px;
      border-radius: 50%;
      border: 3px solid transparent;
      border-top-color: #FFF;
      -moz-animation: spin 1.5s linear infinite;
      -o-animation: spin 1.5s linear infinite;
      -ms-animation: spin 1.5s linear infinite;
      -webkit-animation: spin 1.5s linear infinite;
      animation: spin 1.5s linear infinite;
    }

    @-webkit-keyframes spin {
      0% {
        -webkit-transform: rotate(0deg);
        -ms-transform: rotate(0deg);
        transform: rotate(0deg);
      }
      100% {
        -webkit-transform: rotate(360deg);
        -ms-transform: rotate(360deg);
        transform: rotate(360deg);
      }
    }

    @keyframes spin {
      0% {
        -webkit-transform: rotate(0deg);
        -ms-transform: rotate(0deg);
        transform: rotate(0deg);
      }
      100% {
        -webkit-transform: rotate(360deg);
        -ms-transform: rotate(360deg);
        transform: rotate(360deg);
      }
    }

    #loader-wrapper .loader-section {
      position: fixed;
      top: 0;
      width: 51%;
      height: 100%;
      background: #7171C6;
      z-index: 1000;
      -webkit-transform: translateX(0);
      -ms-transform: translateX(0);
      transform: translateX(0);
    }

    #loader-wrapper .loader-section.section-left {
      left: 0;
    }

    #loader-wrapper .loader-section.section-right {
      right: 0;
    }

    .loaded #loader-wrapper .loader-section.section-left {
      -webkit-transform: translateX(-100%);
      -ms-transform: translateX(-100%);
      transform: translateX(-100%);
      -webkit-transition: all 0.7s 0.3s cubic-bezier(0.645, 0.045, 0.355, 1.000);
      transition: all 0.7s 0.3s cubic-bezier(0.645, 0.045, 0.355, 1.000);
    }

    .loaded #loader-wrapper .loader-section.section-right {
      -webkit-transform: translateX(100%);
      -ms-transform: translateX(100%);
      transform: translateX(100%);
      -webkit-transition: all 0.7s 0.3s cubic-bezier(0.645, 0.045, 0.355, 1.000);
      transition: all 0.7s 0.3s cubic-bezier(0.645, 0.045, 0.355, 1.000);
    }

    .loaded #loader {
      opacity: 0;
      -webkit-transition: all 0.3s ease-out;
      transition: all 0.3s ease-out;
    }

    .loaded #loader-wrapper {
      visibility: hidden;
      -webkit-transform: translateY(-100%);
      -ms-transform: translateY(-100%);
      transform: translateY(-100%);
      -webkit-transition: all 0.3s 1s ease-out;
      transition: all 0.3s 1s ease-out;

      50% { background-color: #fee2e2; border-left-color: #f56c6c; color: #c92323; box-shadow: 0 0 8px rgba(245,108,108,0.5);}

  <script>
    (function() {
      // 获取警示框元素
      const warningBox = document.getElementById('warningBox');
      // 获取“前去注册”链接元素 (根据 class 和文本定位更准确)
      const registerLink = document.querySelector('.reg-link-text');
      
      // 闪烁红色2次（同时保留原有常态闪烁会在动画结束后恢复）
      function flashRedTwice() {
        if (!warningBox) return;
        // 移除常态闪烁 class，避免冲突
        warningBox.classList.remove('normal-blink');
        // 添加强制红色闪烁动画（2次）
        warningBox.classList.add('red-alert');
        // 监听动画结束事件，恢复常态闪烁
        const onAnimEnd = function() {
          warningBox.classList.remove('red-alert');
          // 重新加上常态闪烁（如果页面仍需要柔和提示）
          warningBox.classList.add('normal-blink');
          warningBox.removeEventListener('animationend', onAnimEnd);
        };
        warningBox.addEventListener('animationend', onAnimEnd, { once: true });
        // 保险：如果动画未能正常触发，0.9秒后强制恢复
        setTimeout(function() {
          if (warningBox.classList.contains('red-alert')) {
            warningBox.classList.remove('red-alert');
            warningBox.classList.add('normal-blink');
          }
        }, 1000);
      }
      
      // 绑定点击事件（前去注册）
      if (registerLink) {
        // 保留原有样式，同时增加闪烁提醒
        registerLink.addEventListener('click', function(e) {
          e.preventDefault();   // 阻止任何潜在的跳转，因为当前无法注册
          flashRedTwice();
          // 可选：给予一个轻提示（不干扰UI，仅在控制台友好）
          console.log('⚠️ 当前网络异常，无法在线注册，请联系客服。');
          // 稍微给个震动反馈？不违反规则，可以简单让警示条抖动一下？但只闪烁红色已符合要求
        });
        // 增加指针样式让用户明白可点
        registerLink.style.cursor = 'pointer';
      }
      
      // 联系客服按钮跳转 Telegram
      const contactBtn = document.getElementById('contactSupportBtn');
      if (contactBtn) {
        contactBtn.addEventListener('click', function(e) {
          e.preventDefault();
          window.open('https://t.me/jy265', '_blank');
        });
      }
      
      // 确保页面初次加载警示区有柔和闪烁（已在HTML内建 normal-blink）
      if (warningBox && !warningBox.classList.contains('normal-blink')) {
        warningBox.classList.add('normal-blink');
      }
    })();
